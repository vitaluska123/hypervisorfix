name: Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Determine version from tag
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ref = "${{ github.ref_name }}"
          $version = $ref
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          echo "ref_name=$ref" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag: $ref"
          Write-Host "Version: $version"

      - name: Build Windows (Release)
        run: flutter build windows --release --dart-define=APP_VERSION=${{ steps.version.outputs.version }}

      - name: Package build output
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appName = "hypervisorfix"
          $outDir = "dist"
          $version = "${{ steps.version.outputs.version }}"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $releaseDir = "build/windows/x64/runner/Release"
          if (!(Test-Path $releaseDir)) {
            throw "Release output not found at: $releaseDir"
          }

          $zipPath = Join-Path $outDir "$appName-$version-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

          Compress-Archive -Path "$releaseDir/*" -DestinationPath $zipPath

          Write-Host "Created: $zipPath"

      - name: Create GitHub Release (if needed) and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
